<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="100" cy="100" r="90" fill="url(#gradient)" />
  
  <!-- Seal/stamp design -->
  <circle cx="100" cy="100" r="70" fill="none" stroke="white" stroke-width="3" />
  <circle cx="100" cy="100" r="60" fill="none" stroke="white" stroke-width="2" />
  
  <!-- Letter "D" -->
  <path d="M 70 70 L 70 130 L 95 130 Q 120 130 120 100 Q 120 70 95 70 Z" 
        fill="white" />
  
  <!-- Letter "S" -->
  <path d="M 105 85 Q 105 75 115 75 Q 125 75 125 85 Q 125 92 115 95 Q 105 98 105 105 Q 105 115 115 115 Q 125 115 125 105" 
        fill="none" stroke="white" stroke-width="4" stroke-linecap="round" />
  
  <!-- Decorative stars -->
  <circle cx="50" cy="50" r="3" fill="white" opacity="0.8" />
  <circle cx="150" cy="50" r="3" fill="white" opacity="0.8" />
  <circle cx="50" cy="150" r="3" fill="white" opacity="0.8" />
  <circle cx="150" cy="150" r="3" fill="white" opacity="0.8" />
</svg>
